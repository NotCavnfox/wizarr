# Fork CI gate. Calls the shared reusable workflow in NotCavnfox/.github.
name: fork-build-test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    uses: NotCavnfox/.github/.github/workflows/build-test.yml@main
    permissions:
      contents: read
      packages: write
    with:
      image_name: ghcr.io/notcavnfox/wizarr
      smoke_port: 5690
      smoke_path: /
      compose_test: true
      publish_edge: true
